<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GKE &amp; Cloud Run — Google Cloud EBC Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #4285F4;
      --red:    #EA4335;
      --yellow: #FBBC05;
      --green:  #34A853;
      --bg:     #0D1B2A;
      --surface:#112233;
      --card:   rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.10);
      --text:   #E8EAED;
      --muted:  rgba(232,234,237,0.55);
      --font:   'Google Sans', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
    }

    /* ── Slide Stage ─────────────────────────────────── */
    #stage {
      position: relative;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0 72px 48px;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      overflow: hidden;
    }
    .slide.active   { transform: translateX(0); }
    .slide.prev     { transform: translateX(-100%); }

    /* ── Slide Header ────────────────────────────────── */
    .slide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .gc-wordmark {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gc-wordmark svg { flex-shrink: 0; }

    .speaker-badge {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text);
      background: rgba(66,133,244,0.18);
      border: 1px solid rgba(66,133,244,0.35);
      border-radius: 100px;
      padding: 4px 14px;
      white-space: nowrap;
    }

    /* ── Slide Body ──────────────────────────────────── */
    .slide-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Typography ──────────────────────────────────── */
    .hero-title {
      font-size: clamp(36px, 5.5vw, 62px);
      font-weight: 700;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 12px;
    }
    .hero-subtitle {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .section-title {
      font-size: clamp(26px, 3.5vw, 42px);
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
      margin-bottom: 6px;
    }
    .section-subtitle {
      font-size: clamp(14px, 1.6vw, 18px);
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── Label Chip ──────────────────────────────────── */
    .label-chip {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--blue);
      border: 1px solid var(--blue);
      border-radius: 100px;
      padding: 4px 16px;
      margin-bottom: 20px;
    }

    /* ── Agenda list (slide 1) ───────────────────────── */
    .agenda-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
    }
    .agenda-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: var(--text);
    }
    .agenda-list li::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }

    .tagline {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ── Cards generic ───────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 22px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    .card-body {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ── Accent-border cards (slide 2) ──────────────── */
    .accent-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .accent-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px 16px 24px;
      border-left-width: 4px;
    }
    .accent-card .card-body ul { list-style: none; margin-top: 6px; }
    .accent-card .card-body ul li {
      padding: 2px 0;
      padding-left: 14px;
      position: relative;
    }
    .accent-card .card-body ul li::before {
      content: '•';
      position: absolute; left: 0;
      color: inherit;
      opacity: 0.6;
    }
    .accent-card blockquote {
      font-style: italic;
      font-size: 14px;
      color: var(--text);
      opacity: 0.9;
    }

    /* ── Two-column layout (slide 3) ────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1.9fr;
      gap: 24px;
      align-items: start;
    }
    .col-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .pain-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .pain-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
    }
    .pain-item strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 3px;
    }
    .pain-item span { font-size: 13px; color: var(--muted); }

    /* ── Comparison table (slide 3) ─────────────────── */
    .cmp-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .cmp-table th {
      background: rgba(66,133,244,0.18);
      color: var(--text);
      font-weight: 700;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .cmp-table td {
      background: var(--card);
      padding: 9px 14px;
      vertical-align: top;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .cmp-table tr:last-child td { border-bottom: none; }
    .cmp-table td:first-child { color: var(--text); font-weight: 500; }

    /* ── Pillar cards (slide 4) ──────────────────────── */
    .pillars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 20px;
    }
    .pillar-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pillar-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .pillar-card h3 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .pillar-card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }
    .pillar-desc {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: -6px;
    }
    .pillar-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .pillar-bullets li {
      font-size: 12px;
      color: var(--muted);
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }
    .pillar-bullets li::before {
      content: '›';
      position: absolute;
      left: 0;
      opacity: 0.7;
    }
    .pillar-bullets li.best-for {
      font-weight: 600;
      color: var(--text);
      opacity: 0.8;
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 2px;
    }
    /* ── Ecosystem strip (slide 4) ──────────────────── */
    .ecosystem-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }
    .ecosystem-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-right: 4px;
    }
    .ecosystem-chip {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 12px;
    }

    /* ── Highlight quote box ─────────────────────────── */
    .highlight-box {
      background: rgba(66,133,244,0.1);
      border: 1px solid rgba(66,133,244,0.3);
      border-radius: 10px;
      padding: 16px 22px;
      font-size: 15px;
      color: var(--text);
      font-style: italic;
    }
    .highlight-box span {
      display: block;
      margin-top: 6px;
      font-style: normal;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
    }

    /* ── Takeaway box ────────────────────────────────── */
    .takeaway {
      background: rgba(52,168,83,0.1);
      border: 1px solid rgba(52,168,83,0.3);
      border-left: 4px solid var(--green);
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 14px;
      font-style: italic;
      color: var(--text);
      margin-top: 18px;
    }
    .takeaway strong {
      display: block;
      font-size: 12px;
      font-style: normal;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--green);
      margin-bottom: 4px;
    }

    /* ── Phase cards (slide 5) ───────────────────────── */
    .phases {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      flex: 1;
    }
    .phase-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top-width: 3px;
    }
    .phase-num {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .phase-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .phase-tagline {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      font-style: italic;
    }
    .phase-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .phase-bullets li {
      font-size: 13px;
      color: var(--muted);
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }
    .phase-bullets li::before {
      content: '•';
      position: absolute; left: 0;
    }

    /* ── Navigation Arrows ───────────────────────────── */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, opacity 0.2s;
      z-index: 100;
      user-select: none;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }
    #btn-prev { left: 14px; }
    #btn-next { right: 14px; }

    /* ── Progress Dots ───────────────────────────────── */
    #dots {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: var(--blue);
      transform: scale(1.3);
    }

    /* ── Slide 1 hero layout ─────────────────────────── */
    #slide-1 .slide-body {
      gap: 0;
    }
    .hero-content {
      max-width: 700px;
    }
    .agenda-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-top: 8px;
    }
    .agenda-col-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Slide 2 ─────────────────────────────────────── */
    #slide-2 .slide-body {
      gap: 0;
    }
    .s2-intro {
      font-size: 15px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Slide 3 ─────────────────────────────────────── */
    #slide-3 .slide-body {
      gap: 0;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     SLIDE STAGE
═══════════════════════════════════════════════════ -->
<div id="stage"></div>

<!-- ═══════════════════════════════════════════════════
     NAVIGATION
═══════════════════════════════════════════════════ -->
<button class="nav-btn" id="btn-prev" aria-label="Previous slide" disabled>&#8249;</button>
<button class="nav-btn" id="btn-next" aria-label="Next slide">&#8250;</button>

<!-- ═══════════════════════════════════════════════════
     PROGRESS DOTS
═══════════════════════════════════════════════════ -->
<div id="dots"></div>

<!-- ═══════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════ -->
<script>
  (async function () {
    const stage  = document.getElementById('stage');
    const dotsEl = document.getElementById('dots');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    // Load slide fragments sequentially
    const SLIDE_COUNT = 8;
    for (let i = 1; i <= SLIDE_COUNT; i++) {
      const res  = await fetch(`slides/slide-${i}.html`);
      const html = await res.text();
      stage.insertAdjacentHTML('beforeend', html);
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsEl.appendChild(dot);
    }

    const slides = Array.from(document.querySelectorAll('.slide'));
    const dots   = Array.from(document.querySelectorAll('.dot'));
    const total  = slides.length;
    let current  = 0;

    // Mark first slide and dot active
    slides[0].classList.add('active');
    dots[0].classList.add('active');

    function goTo(next) {
      if (next < 0 || next >= total || next === current) return;

      const direction = next > current ? 1 : -1;

      slides[current].classList.remove('active', 'prev');
      slides[next].classList.remove('active', 'prev');

      slides[next].style.transition = 'none';
      slides[next].style.transform  = `translateX(${direction * 100}%)`;

      slides[next].getBoundingClientRect();

      slides[next].style.transition  = '';
      slides[next].style.transform   = '';
      slides[current].style.transition = '';
      slides[current].style.transform  = `translateX(${-direction * 100}%)`;

      const leaving = current;
      slides[leaving].addEventListener('transitionend', function handler() {
        slides[leaving].removeEventListener('transitionend', handler);
        slides[leaving].style.transform = '';
        slides[leaving].classList.add('prev');
        slides.forEach((s, i) => { if (i !== current) s.classList.remove('active'); });
      });

      slides[next].classList.add('active');

      dots[current].classList.remove('active');
      dots[next].classList.add('active');

      current = next;

      btnPrev.disabled = current === 0;
      btnNext.disabled = current === total - 1;
    }

    btnPrev.addEventListener('click', () => goTo(current - 1));
    btnNext.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    btnPrev.disabled = true;
    btnNext.disabled = false;
  })();
</script>
</body>
</html>
